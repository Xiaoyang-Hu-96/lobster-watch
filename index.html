}

// ─── APPROVAL DOCK ────────────────────────────────────────────────────────────
function renderApproval(el) {
  const headerEl = document.createElement('div');
  headerEl.innerHTML = `
    <div class="section-label">Approval Dock</div>
    <div class="section-title">Waiting for you</div>
    <div class="text-sm" style="margin-bottom:14px;">${state.approvalItems.length} item${state.approvalItems.length !== 1 ? 's' : ''} pending</div>
  `;
  el.appendChild(headerEl);

  if (state.approvalItems.length === 0) {
    const emptyEl = document.createElement('div');
    emptyEl.className = 'empty-state';
    emptyEl.innerHTML = `
      <div class="empty-state-icon">${icon('anchor', 40, 'var(--gray-light)')}</div>
      <div class="empty-state-text">All clear at the dock</div>
      <div class="text-sm">No actions waiting for your approval</div>
    `;
    el.appendChild(emptyEl);
  }

  state.approvalItems.forEach(item => {
    if (item.type === 'email') {
      const cardEl = document.createElement('div');
      cardEl.className = 'approval-card';
      cardEl.innerHTML = `
        <div class="approval-type" style="display:flex;align-items:center;gap:6px;">${icon('mail',12,'var(--gray)')} Send Email · waiting for approval</div>
        <div style="font-family:'Pixelify Sans',monospace; font-size:14px; color:var(--ocean); margin-bottom:2px;">${item.subject}</div>
        <div class="text-xs" style="margin-bottom:8px;">To: ${item.to}</div>
        <div class="approval-content">${item.preview}</div>
        <div class="approval-buttons">
          <div class="approval-btn approve" data-id="${item.id}" data-action="approve">${icon('check', 13, 'currentColor')} Approve</div>
          <div class="approval-btn edit">${icon('edit', 13, 'currentColor')} Edit</div>
          <div class="approval-btn deny" data-id="${item.id}" data-action="deny">${icon('x', 13, 'currentColor')} Deny</div>
        </div>
      `;
      cardEl.querySelectorAll('[data-action]').forEach(btn => {
        btn.onclick = () => {
          const newItems = state.approvalItems.filter(i => i.id !== parseInt(btn.dataset.id));
          const resolved = { ...item, resolution: btn.dataset.action, time: 'just now' };
          setState({
            approvalItems: newItems,
            resolvedItems: [resolved, ...state.resolvedItems],
          });
        };
      });
      el.appendChild(cardEl);

    } else if (item.type === 'budget') {
      const cardEl = document.createElement('div');
      cardEl.className = 'approval-card budget';
      cardEl.innerHTML = `
        <div class="approval-type budget" style="display:flex;align-items:center;gap:6px;">${icon('dollarSign',12,'var(--amber)')} Budget Alert · agent paused</div>
        <div style="font-family:'Pixelify Sans',monospace; font-size:14px; color:var(--dark); margin-bottom:4px;">Daily budget reached: ${item.spent} / ${item.budget}</div>
        <div class="text-sm" style="margin-bottom:10px;">Choose how to continue:</div>
        <div id="savings-list"></div>
        <div class="approval-buttons" style="margin-top:10px;">
          <div class="approval-btn approve" data-id="${item.id}" data-action="apply">Apply & Resume</div>
          <div class="approval-btn edit" data-id="${item.id}" data-action="resume">Resume Anyway</div>
          <div class="approval-btn deny" data-id="${item.id}" data-action="pause">Pause Today</div>
        </div>
      `;
      const savingsList = cardEl.querySelector('#savings-list');
      item.savings.forEach((s, i) => {
        const sEl = document.createElement('div');
        sEl.className = `savings-option ${state.selectedSavings === i ? 'selected' : ''}`;
        sEl.innerHTML = `
          <div class="savings-radio ${state.selectedSavings === i ? 'selected' : ''}"></div>
          <div class="savings-text">${s.text}</div>
          <div class="savings-amount">${s.amount}</div>
        `;
        sEl.onclick = () => setState({ selectedSavings: i });
        savingsList.appendChild(sEl);
      });
      cardEl.querySelectorAll('[data-action]').forEach(btn => {
        btn.onclick = () => {
          const newItems = state.approvalItems.filter(i => i.id !== parseInt(btn.dataset.id));
          setState({ approvalItems: newItems, resolvedItems: [{ ...item, resolution: btn.dataset.action, time: 'just now' }, ...state.resolvedItems] });
        };
      });
      el.appendChild(cardEl);
    }
  });

  // Recently resolved
  if (state.resolvedItems.length > 0) {
    const resolvedEl = document.createElement('div');
    resolvedEl.innerHTML = `<div class="section-label" style="margin-top:8px;">Recently Resolved</div>`;
    const list = document.createElement('div');
    list.className = 'recently-resolved';
    state.resolvedItems.slice(0, 3).forEach(item => {
      const resolvedIcon = item.resolution === 'approve' || item.resolution === 'apply'
        ? icon('check', 14, 'var(--seafoam)')
        : item.resolution === 'deny'
        ? icon('x', 14, 'var(--coral)')
        : icon('pause', 14, 'var(--amber)');
      const label = item.type === 'email' ? item.subject : 'Budget alert';
      list.innerHTML += `
        <div class="resolved-item">
          <span class="resolved-badge">${resolvedIcon}</span>
          <span style="flex:1;">${label}</span>
          <span class="text-xs">${item.time}</span>
        </div>
      `;
    });
    resolvedEl.appendChild(list);
    el.appendChild(resolvedEl);
  }
}

        </div>

    `;

    modal.querySelectorAll('[data-mode]').forEach(tab => {
      tab.onclick = () => setState({ plantMode: tab.dataset.mode });
    });

    const importNext = modal.querySelector('#modal-import-next');
    if (importNext) {
      importNext.onclick = () => setState({ showModal: 'import-loading' });
      setTimeout(() => {
        if (state.showModal === 'import-loading') {
          setState({ showModal: 'import-review' });
        }
      }, 1800);
    }

  } else if (state.showModal === 'import-loading') {
    modal.innerHTML = `
      <div class="modal-handle"></div>
      <div style="text-align:center; padding:32px 16px;">
        <div style="font-size:40px; animation:bob 1s ease-in-out infinite; display:inline-block;">🦞</div>
        <div style="font-family:'Pixelify Sans',monospace; font-size:15px; color:var(--ocean); margin-top:16px; margin-bottom:8px;">Reading your conversations...</div>
        <div class="text-sm">Extracting memories with AI · ~$0.01</div>
      </div>
    `;

  } else if (state.showModal === 'import-review') {
    modal.innerHTML = `
      <div class="modal-handle"></div>
      <div class="modal-title">Review Memories</div>
      <div class="modal-subtitle">Select what your lobster should remember. Uncheck anything you'd rather keep private.</div>
      <div id="candidates-list" style="max-height:280px; overflow-y:auto; margin: 12px 0;"></div>
      <div class="modal-buttons">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm">Plant ${state.importCandidates.filter(c => c.checked).length} Memories</button>
      </div>
    `;

    const list = modal.querySelector('#candidates-list');
    state.importCandidates.forEach(c => {
      const cEl = document.createElement('div');
      cEl.className = 'memory-candidate';
      cEl.innerHTML = `
        <div class="candidate-check ${c.checked ? 'checked' : ''}" data-id="${c.id}">${c.checked ? icon('check',12,'white') : ''}</div>
        <div>
          <div class="candidate-text">${c.text}</div>
          <div class="candidate-source">${c.source}</div>
        </div>
      `;
      cEl.querySelector('.candidate-check').onclick = () => {
        const updated = state.importCandidates.map(cc => cc.id === c.id ? {...cc, checked: !cc.checked} : cc);
        setState({ importCandidates: updated });
      };
      list.appendChild(cEl);
    });
  }

  // Wire up common buttons
  overlay.appendChild(modal);

  overlay.querySelector('#modal-cancel')?.addEventListener('click', () => {
    setState({ showModal: null, modalData: null });
  });

  overlay.querySelector('#modal-confirm')?.addEventListener('click', () => {
    if (state.showModal === 'consequence') {
      applyIntervention(state.modalData.eventId, state.modalData.actionType);
    } else if (state.showModal === 'hint') {
      applyIntervention(state.modalData.id, 'hint');
    } else if (state.showModal === 'reframe') {
      applyIntervention(state.modalData.id, 'reframe');
    } else if (state.showModal === 'delete-memory') {
      const updated = state.memories.filter(m => m.id !== state.modalData.id);
      setState({ showModal: null, modalData: null, memories: updated });
    } else if (state.showModal === 'plant' && state.plantMode === 'text') {
      const text = document.querySelector('#plant-text')?.value || state.plantText;
      if (text.trim()) {
        const newMem = { id: Date.now(), source: 'user', text: text.trim(), date: 'just now' };
        setState({ showModal: null, memories: [newMem, ...state.memories] });
      }
    } else if (state.showModal === 'import-review') {
      const toAdd = state.importCandidates.filter(c => c.checked).map(c => ({
        id: Date.now() + c.id,
        source: 'imported',
        text: c.text,
        date: 'just now',
        importSource: 'ChatGPT',
      }));
      setState({ showModal: null, memories: [...toAdd, ...state.memories] });
    } else {
      setState({ showModal: null, modalData: null });
    }
  });

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) setState({ showModal: null, modalData: null });
  });

  return overlay;
}

// ─── RETRO NOISE TEXTURE ──────────────────────────────────────────────────────
const _noiseCanvas = document.createElement('canvas');
_noiseCanvas.width = 128;
_noiseCanvas.height = 128;
const _noiseCtx = _noiseCanvas.getContext('2d');
const _noiseData = _noiseCtx.createImageData(128, 128);
for (let i = 0; i < _noiseData.data.length; i += 4) {
  const v = Math.random() * 255;
  _noiseData.data[i] = v;
  _noiseData.data[i + 1] = v;
  _noiseData.data[i + 2] = v;
  _noiseData.data[i + 3] = 18;
}
_noiseCtx.putImageData(_noiseData, 0, 0);
const NOISE_URL = _noiseCanvas.toDataURL('image/png');

function applyRetroNoise(el) {
  if (!el || el._noiseApplied) return;
  const bg = getComputedStyle(el).backgroundColor;
  el.style.backgroundImage = `url("${NOISE_URL}")`;
  el.style.backgroundRepeat = 'repeat';
  el.style.backgroundSize = '128px 128px';
  el.style.backgroundColor = bg;
  el._noiseApplied = true;
}

// ─── DRAWER DRAG + SPRING PHYSICS ─────────────────────────────────────────────
// Global drag state — one system, no leaked listeners
const _drag = {
  active: false,
  startY: 0,
  offset: 0,
  springRAF: null,
  targetEl: null,   // the draggable element currently being dragged
  handleEl: null,
};

const STIFFNESS = 300;
const DAMPING = 22;
const RESISTANCE = 0.35;

function _dragApplyTransform(el, offsetY) {
  if (!el) return;
  el.style.transform = el.classList.contains('drawer-container')
    ? `translateX(-50%) translateY(${offsetY}px)`
    : `translateY(${offsetY}px)`;
}

function _dragSpringBack() {
  let velocity = 0;
  let position = _drag.offset;
  let lastTime = performance.now();
  const el = _drag.targetEl;

  function tick(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.064);
    lastTime = now;
    const springForce = -STIFFNESS * position;
    const dampingForce = -DAMPING * velocity;
    velocity += (springForce + dampingForce) * dt;
    position += velocity * dt;

    if (Math.abs(position) < 0.5 && Math.abs(velocity) < 0.5) {
      position = 0;
      _drag.offset = 0;
      _dragApplyTransform(el, 0);
      _drag.springRAF = null;
      return;
    }
    _drag.offset = position;
    _dragApplyTransform(el, position);
    _drag.springRAF = requestAnimationFrame(tick);
  }
  _drag.springRAF = requestAnimationFrame(tick);
}

function _dragGetY(e) {
  return e.touches ? e.touches[0].clientY : e.clientY;
}

function _dragOnMove(e) {
  if (!_drag.active || !_drag.targetEl) return;
  e.preventDefault();
  let raw = _dragGetY(e) - _drag.startY;
  if (raw < 0) raw = raw * RESISTANCE;
  _drag.offset = raw;
  _dragApplyTransform(_drag.targetEl, raw);
}

function _dragOnEnd() {
  if (!_drag.active) return;
  _drag.active = false;
  if (_drag.handleEl) _drag.handleEl.style.cursor = 'grab';
  _dragSpringBack();
}

// Single set of global move/end listeners — never duplicated
window.addEventListener('touchmove', _dragOnMove, { passive: false });
window.addEventListener('touchend', _dragOnEnd);
window.addEventListener('mousemove', _dragOnMove);
window.addEventListener('mouseup', _dragOnEnd);

function initDrawerDrag(handleEl, draggableEl) {
  function onStart(e) {
    if (_drag.springRAF) { cancelAnimationFrame(_drag.springRAF); _drag.springRAF = null; }
    _drag.active = true;
    _drag.targetEl = draggableEl;
    _drag.handleEl = handleEl;
    _drag.startY = _dragGetY(e) - _drag.offset;
    draggableEl.style.transition = 'none';
    handleEl.style.cursor = 'grabbing';
  }

  handleEl.addEventListener('touchstart', onStart, { passive: true });
  handleEl.addEventListener('mousedown', onStart);
}

// Auto-attach drag to drawers after each render
const _origRender = render;
render = function() {
  _origRender();
  requestAnimationFrame(() => {
    // Non-harbor drawer
    const drawerContainer = document.querySelector('.drawer-container');
    if (drawerContainer) {
      applyRetroNoise(drawerContainer);
      if (!drawerContainer._dragInit) {
        const handle = drawerContainer.querySelector('.drawer-handle');
        if (handle) {
          // Reset drag offset when switching pages
          _drag.offset = 0;
          initDrawerDrag(handle, drawerContainer);
          drawerContainer._dragInit = true;
        }
      }
    }
    // Harbor catch panel
    const harborCatch = document.querySelector('.harbor-catch');
    if (harborCatch) {
      applyRetroNoise(harborCatch);
      if (!harborCatch._dragInit) {
        const handle = harborCatch.querySelector('.drawer-handle');
        if (handle) {
          _drag.offset = 0;
          initDrawerDrag(handle, harborCatch);
          harborCatch._dragInit = true;
        }
      }
    }
  });
};

// ─── LIVE DATA LOADING ───────────────────────────────────────────────────────

async function loadLiveData() {
  console.log('[Live] Loading data from OpenClaw Gateway...');

  try {
    // Load memory from REST API
    const memoryData = await gateway.getMemories();
    if (memoryData.entries && memoryData.entries.length > 0) {
      setState({ memories: memoryData.entries });
      console.log(`[Live] Loaded ${memoryData.entries.length} memories`);
    }
  } catch (err) {
    console.warn('[Live] Memory load failed (expected if no MEMORY.md):', err.message);
  }

  try {
    // Load pending approvals
    const approvals = await gateway.getPendingApprovals();
    if (approvals && approvals.pending) {
      const mapped = approvals.pending.map((p, i) => ({
        id: p.id || i + 1,
        type: p.type || 'email',
        title: p.payload?.title || p.type || 'Pending Approval',
        preview: p.payload?.command || p.payload?.preview || JSON.stringify(p.payload),
        ...p.payload,
      }));
      setState({ approvalItems: mapped });
      console.log(`[Live] Loaded ${mapped.length} pending approvals`);
    }
  } catch (err) {
    console.warn('[Live] Approvals load failed:', err.message);
  }

  try {
    // Load health status
    const health = await gateway.getHealth();
    if (health) {
      console.log('[Live] Health:', health);
      // Update agent status from health snapshot
      const agentStatus = health.status === 'running' ? 'active'
        : health.status === 'error' ? 'failed' : 'idle';
      setState({ agentStatus });
    }
  } catch (err) {
    console.warn('[Live] Health load failed:', err.message);
  }

  try {
    // Load tools catalog
    const tools = await gateway.getToolsCatalog();
    if (tools) {
      console.log('[Live] Tools catalog loaded');
    }
  } catch (err) {
    console.warn('[Live] Tools load failed:', err.message);
  }

  try {
    // Load sessions (agents)
    const sessions = await gateway.getSessions();
    if (sessions && sessions.sessions) {
      console.log(`[Live] Loaded ${sessions.sessions.length} sessions`);
    }
  } catch (err) {
    console.warn('[Live] Sessions load failed:', err.message);
  }
}

function setupGatewayEvents() {
  // Real-time approval requests
  gateway.on('exec.approval.requested', (payload) => {
    console.log('[Live] New approval requested:', payload);
    const newItem = {
      id: payload.id || Date.now(),
      type: payload.type || 'email',
      title: payload.payload?.title || 'New Approval',
      preview: payload.payload?.command || payload.payload?.preview || '',
      ...payload.payload,
    };
    setState({
      approvalItems: [newItem, ...state.approvalItems],
      toast: { message: 'New approval request', color: 'amber' },
    });
    setTimeout(() => setState({ toast: null }), 3000);
  });

  // Heartbeat events
  gateway.on('heartbeat', (payload) => {
    console.log('[Live] Heartbeat:', payload);
    // Could append to HEARTBEAT_EVENTS in future
  });

  // Health changes
  gateway.on('health', (payload) => {
    console.log('[Live] Health changed:', payload);
  });

  // Proxy connection events
  gateway.on('_proxy_disconnected', (payload) => {
    setState({
      gatewayReady: false,
      gatewayConnected: false,
      gatewayConnecting: false,
      gatewayError: payload.message,
      showDisconnectOverlay: !state.forceMock,
    });
  });

  gateway.on('_proxy_error', (payload) => {
    setState({
      gatewayReady: false,
      gatewayConnecting: false,
      gatewayError: payload.message,
      showDisconnectOverlay: !state.forceMock,
    });
  });

  // Connection status callback
  gateway.onStatusChange((connected, ready) => {
    setState({
      gatewayConnected: connected,
      gatewayReady: ready,
      gatewayError: connected ? null : state.gatewayError,
    });
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();

if (!USE_MOCK) {
  setupGatewayEvents();
  setState({ gatewayConnecting: true });

  gateway.connect().then(() => {
    console.log('[Lobster Watch] Gateway connected! Loading live data...');
    setState({
      gatewayConnected: true,
      gatewayReady: true,
      gatewayConnecting: false,
      showDisconnectOverlay: false,
      toast: { message: '🦞 Connected to OpenClaw', color: 'green' },
    });
    setTimeout(() => setState({ toast: null }), 3000);
    loadLiveData();
  }).catch((err) => {
    console.warn('[Lobster Watch] Gateway connection failed:', err.message);
    setState({
      gatewayConnected: false,
      gatewayConnecting: false,
      gatewayError: err.message,
      showDisconnectOverlay: true,
    });
  });
}
