<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🦞 Lobster Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<style>
  :root {
    --ocean: #1a3a4a;
    --ocean-mid: #2a5570;
    --ocean-light: #3a7a9c;
    --sand: #f5e6c8;
    --sand-light: #fdf6ec;
    --coral: #e8724a;
    --coral-light: #f5a882;
    --coral-faint: #fde8de;
    --seafoam: #4ab8a0;
    --seafoam-light: #a8ddd4;
    --seafoam-faint: #e8f7f5;
    --amber: #f0a830;
    --amber-light: #fde9b8;
    --red: #d94f3d;
    --red-light: #fde0dc;
    --gray: #8a9aaa;
    --gray-light: #e8eef2;
    --white: #fdf6ec;
    --dark: #1a2a35;
    --pixel-border: 2px solid var(--ocean);
    --card-shadow: 3px 3px 0px var(--ocean);
    --card-shadow-sm: 2px 2px 0px var(--ocean);
    --pixel-clip: polygon(
      0 4px, 4px 4px, 4px 0,
      calc(100% - 4px) 0, calc(100% - 4px) 4px, 100% 4px,
      100% calc(100% - 4px), calc(100% - 4px) calc(100% - 4px), calc(100% - 4px) 100%,
      4px 100%, 4px calc(100% - 4px), 0 calc(100% - 4px)
    );
    --pixel-clip-sm: polygon(
      0 3px, 3px 3px, 3px 0,
      calc(100% - 3px) 0, calc(100% - 3px) 3px, 100% 3px,
      100% calc(100% - 3px), calc(100% - 3px) calc(100% - 3px), calc(100% - 3px) 100%,
      3px 100%, 3px calc(100% - 3px), 0 calc(100% - 3px)
    );
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* retro noise — applied via JS-generated canvas tile */

  html { background: #0f172a; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 0;
  }

  #app {
    width: 390px;
    min-height: 100vh;
    background: transparent;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOPBAR — fixed floating header */
  .topbar {
    position: fixed;
    top: 0px;
    left: calc(50% - 30px);
    transform: translateX(-50%);
    width: 390px;
    z-index: 50;
    display: flex;
    justify-content: center;
    background: transparent;
    pointer-events: none;
    padding: 0 8px;
  }

  .topbar-settings {
    position: absolute;
    top: 21px;
    right: -12px;
    width: 66px;
    height: 66px;
    background: transparent;
    border: none;
    cursor: pointer;
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
  }

  .topbar-settings:hover {
    transform: scale(1.1);
  }

  .topbar-settings:active {
    transform: scale(0.95);
  }

  @keyframes gentle-swing {
    0% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
    100% { transform: rotate(-1.5deg); }
  }

  .topbar-sign {
    width: 85%;
    display: block;
    background: transparent;
    pointer-events: auto;
    transform-origin: top center;
    animation: gentle-swing 6s ease-in-out infinite;
  }

  .topbar-sign img {
    width: 100%;
    height: auto;
    display: block;
  }

  .topbar-logo {
    font-family: 'Pixelify Sans', monospace;
    color: var(--sand);
    font-size: 18px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .agent-switcher {
    background: var(--ocean-mid);
    border: 2px solid var(--ocean-light);
    border-radius: 0;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .agent-switcher:hover { background: var(--ocean-light); }

  .agent-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--seafoam);
    box-shadow: 0 0 6px var(--seafoam);
    animation: pulse 2s infinite;
  }

  .agent-dot.idle { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .agent-name {
    font-family: 'Pixelify Sans', monospace;
    color: var(--sand);
    font-size: 13px;
  }

  .agent-chevron { color: var(--gray); font-size: 10px; }

  /* AGENT DROPDOWN */
  .agent-dropdown {
    position: absolute;
    top: 56px;
    right: 16px;
    background: var(--ocean);
    border: 2px solid var(--ocean-light);
    border-radius: 0;
    padding: 6px;
    z-index: 55;
    box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
    min-width: 160px;
    clip-path: var(--pixel-clip-sm);
  }

  .agent-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 0;
    cursor: pointer;
    transition: background 0.1s;
  }

  .agent-option:hover { background: var(--ocean-mid); }
  .agent-option.active { background: var(--ocean-mid); }
  .agent-option-name { font-family: 'Pixelify Sans', monospace; color: var(--sand); font-size: 13px; }
  .agent-option-status { font-size: 11px; color: var(--gray); }

  /* MAIN CONTENT */
  .page {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: 80px;
  }

  /* ─── HARBOR ALWAYS-ON BACKGROUND ─── */
  .harbor-bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    width: 390px;
    height: 100vh;
    margin: 0 auto;
    pointer-events: none;
  }

  .harbor-bg-layer img,
  .harbor-bg-layer video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* z-index managed per-rule below */

  /* ─── DRAWER BACKDROP ─── */
  .drawer-backdrop {
    position: fixed;
    inset: 0;
    width: 390px;
    margin: 0 auto;
    background: rgba(15, 23, 42, 0.6);
    z-index: 30;
    pointer-events: auto;
  }

  /* ─── BOTTOM DRAWER ─── */
  .drawer-container {
    position: fixed;
    bottom: 64px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(390px - 2rem);
    min-height: 30vh;
    max-height: calc(100vh - 64px - 100px);
    max-height: calc(100dvh - 64px - 100px);
    display: flex;
    flex-direction: column;
    background: rgba(15, 23, 42, 0.82);
    border-top: 2px solid rgba(253, 246, 227, 0.5);
    border-left: 2px solid rgba(253, 246, 227, 0.5);
    border-right: 2px solid rgba(253, 246, 227, 0.5);
    border-bottom: none;
    border-radius: 0;
    z-index: 40;
    overflow: hidden;
    box-shadow: 6px 0px 0px 0px rgba(0,0,0,0.4);
  }

  .drawer-handle {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 10px 0 6px;
    cursor: grab;
    flex-shrink: 0;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .drawer-handle-lines {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .drawer-handle-line {
    width: 32px;
    height: 2px;
    background: rgba(26, 42, 53, 0.35);
  }

  .drawer-content {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 24px;
  }

  /* ─── JRPG DARK PANEL THEME ─── */
  .dark-panel {
    background: rgba(15, 23, 42, 0.82) !important;
    color: #e2e8f0;
    --ocean: #fdf6e3;
    --dark: #e2e8f0;
    --gray: #94a3b8;
    --gray-light: rgba(253, 246, 227, 0.08);
    --sand: rgba(30, 41, 59, 0.5);
    --sand-light: rgba(30, 41, 59, 0.3);
    --white: rgba(30, 41, 59, 0.6);
    --coral: #fb7185;
    --coral-faint: rgba(251, 113, 133, 0.08);
    --red-light: rgba(251, 113, 133, 0.08);
    --amber: #fbbf24;
    --amber-light: rgba(251, 191, 36, 0.08);
    --seafoam: #34d399;
    --seafoam-faint: rgba(52, 211, 153, 0.08);
    --pixel-border: 2px solid rgba(253, 246, 227, 0.25);
    --card-shadow: 3px 3px 0px rgba(0,0,0,0.3);
    --card-shadow-sm: 2px 2px 0px rgba(0,0,0,0.25);
  }

  .dark-panel .drawer-handle-line {
    background: rgba(148, 163, 184, 0.6);
  }

  /* Section headers */
  .dark-panel .section-label {
    color: #94a3b8;
  }
  .dark-panel .section-title {
    color: #fdf6e3;
  }
  .dark-panel .text-sm {
    color: #94a3b8;
  }
  .dark-panel .text-xs {
    color: #64748b;
  }

  /* Cards */
  .dark-panel .card {
    background: rgba(30, 41, 59, 0.6);
    border-color: rgba(253, 246, 227, 0.25);
    box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
  }
  .dark-panel .card::after {
    border-color: rgba(253, 246, 227, 0.08);
  }

  .dark-panel .card-sm {
    background: rgba(30, 41, 59, 0.6);
    border-color: rgba(253, 246, 227, 0.25);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
  }
  .dark-panel .card-sm::after {
    border-color: rgba(253, 246, 227, 0.08);
  }

  /* Stat chips */
  .dark-panel .stat-chip {
    background: rgba(30, 41, 59, 0.5);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.25);
  }
  .dark-panel .stat-chip-value { color: #fdf6e3; }
  .dark-panel .stat-chip-label { color: #94a3b8; }
  .dark-panel .stat-chip.cost .stat-chip-value { color: #fb7185; }
  .dark-panel .stat-chip.alert .stat-chip-value { color: #fbbf24; }
  .dark-panel .stat-chip.failures-ok .stat-chip-value { color: #34d399; }
  .dark-panel .stat-chip.failures-warn .stat-chip-value { color: #fbbf24; }
  .dark-panel .stat-chip.failures-error .stat-chip-value { color: #fb7185; }

  /* Timeline cards (Heartbeat) */
  .dark-panel .timeline-card {
    background: rgba(30, 41, 59, 0.6);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.25);
  }
  .dark-panel .timeline-card::after {
    border-color: rgba(253, 246, 227, 0.06);
  }
  .dark-panel .timeline-card.alert {
    background: rgba(251, 191, 36, 0.1);
    border-color: rgba(251, 191, 36, 0.4);
    box-shadow: 2px 2px 0px rgba(251, 191, 36, 0.2);
  }
  .dark-panel .timeline-card.alert::after { border-color: rgba(251, 191, 36, 0.1); }
  .dark-panel .timeline-card.danger {
    background: rgba(251, 113, 133, 0.1);
    border-color: rgba(251, 113, 133, 0.4);
    box-shadow: 2px 2px 0px rgba(251, 113, 133, 0.2);
  }
  .dark-panel .timeline-card.danger::after { border-color: rgba(251, 113, 133, 0.1); }
  .dark-panel .timeline-card-title { color: #fdf6e3; }
  .dark-panel .timeline-card-time { color: #64748b; }
  .dark-panel .timeline-card-cost { color: #fb7185; }
  .dark-panel .timeline-card-body { color: #cbd5e1; }

  .dark-panel .timeline::before { background: rgba(253, 246, 227, 0.1); }
  .dark-panel .timeline-dot { background: #334155; border-color: rgba(253, 246, 227, 0.3); }
  .dark-panel .timeline-dot.alert { background: #fbbf24; }
  .dark-panel .timeline-dot.danger { background: #fb7185; }
  .dark-panel .timeline-dot.routine { background: #34d399; }

  .dark-panel .timeline-routine {
    background: rgba(30, 41, 59, 0.4);
    border-color: rgba(253, 246, 227, 0.1);
    color: #64748b;
  }
  .dark-panel .timeline-routine-time { color: #64748b; }

  /* Skill cards */
  .dark-panel .skill-card {
    background: rgba(30, 41, 59, 0.6);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.25);
  }
  .dark-panel .skill-card::after { border-color: rgba(253, 246, 227, 0.06); }
  .dark-panel .skill-name { color: #fdf6e3; }
  .dark-panel .skill-toggle { border-color: rgba(253, 246, 227, 0.3); }
  .dark-panel .skill-toggle.off { background: #334155; }
  .dark-panel .skill-toggle-thumb { background: #e2e8f0; border-color: rgba(253, 246, 227, 0.3); }

  /* Tool cards */
  .dark-panel .tool-card {
    background: rgba(30, 41, 59, 0.5);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.25);
  }
  .dark-panel .tool-card.green { background: rgba(52, 211, 153, 0.08); border-color: rgba(52, 211, 153, 0.4); box-shadow: 2px 2px 0px rgba(52, 211, 153, 0.15); }
  .dark-panel .tool-card.amber { background: rgba(251, 191, 36, 0.08); border-color: rgba(251, 191, 36, 0.4); box-shadow: 2px 2px 0px rgba(251, 191, 36, 0.15); }
  .dark-panel .tool-card.red { background: rgba(251, 113, 133, 0.08); border-color: rgba(251, 113, 133, 0.4); box-shadow: 2px 2px 0px rgba(251, 113, 133, 0.15); }
  .dark-panel .tool-name { color: #fdf6e3; }

  /* Approval cards (Dock) */
  .dark-panel .approval-card {
    background: rgba(30, 41, 59, 0.6);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 3px 3px 0px rgba(0,0,0,0.25);
  }
  .dark-panel .approval-card::after { border-color: rgba(253, 246, 227, 0.06); }
  .dark-panel .approval-card.budget {
    background: rgba(251, 191, 36, 0.08);
    border-color: rgba(251, 191, 36, 0.4);
    box-shadow: 3px 3px 0px rgba(251, 191, 36, 0.15);
  }
  .dark-panel .approval-card.budget::after { border-color: rgba(251, 191, 36, 0.08); }
  .dark-panel .approval-type { color: #94a3b8; }
  .dark-panel .approval-content {
    background: rgba(15, 23, 42, 0.5);
    border-color: rgba(253, 246, 227, 0.15);
    color: #cbd5e1;
  }

  /* Approval / Intervention buttons — neon terminal style */
  .dark-panel .approval-btn {
    background: transparent;
    border-color: rgba(253, 246, 227, 0.3);
    color: #e2e8f0;
    box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
  }
  .dark-panel .approval-btn.approve {
    background: transparent;
    border-color: #34d399;
    color: #34d399;
  }
  .dark-panel .approval-btn.edit {
    background: transparent;
    border-color: #fbbf24;
    color: #fbbf24;
  }
  .dark-panel .approval-btn.deny {
    background: transparent;
    border-color: #fb7185;
    color: #fb7185;
  }

  .dark-panel .intervention-btn {
    background: transparent;
    border-color: rgba(253, 246, 227, 0.3);
    color: #e2e8f0;
    box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
  }
  .dark-panel .intervention-btn:hover {
    background: rgba(253, 246, 227, 0.1);
    color: #fdf6e3;
    border-color: #fdf6e3;
    box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
  }

  .dark-panel .resume-btn {
    background: transparent;
    border-color: rgba(253, 246, 227, 0.3);
    color: #e2e8f0;
  }

  /* Memory items */
  .dark-panel .memory-item {
    background: rgba(30, 41, 59, 0.6);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.25);
  }
  .dark-panel .memory-item::after { border-color: rgba(253, 246, 227, 0.06); }
  .dark-panel .memory-item:hover { box-shadow: 3px 3px 0px rgba(0,0,0,0.3); }
  .dark-panel .memory-text { color: #e2e8f0; }
  .dark-panel .memory-date { color: #64748b; }
  .dark-panel .memory-delete { color: #64748b; }
  .dark-panel .memory-delete:hover { color: #fb7185; }

  .dark-panel .memory-candidate {
    background: rgba(30, 41, 59, 0.6);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.25);
  }
  .dark-panel .memory-candidate::after { border-color: rgba(253, 246, 227, 0.06); }

  .dark-panel .memory-source-tag { background: transparent; }
  .dark-panel .memory-source-tag.user { color: #34d399; border-color: #34d399; background: rgba(52, 211, 153, 0.08); }
  .dark-panel .memory-source-tag.agent { color: #60a5fa; border-color: #60a5fa; background: rgba(96, 165, 250, 0.08); }
  .dark-panel .memory-source-tag.imported { color: #fbbf24; border-color: #fbbf24; background: rgba(251, 191, 36, 0.08); }

  /* Filter tabs */
  .dark-panel .filter-tabs,
  .modal .filter-tabs {
    background: rgba(30, 41, 59, 0.5);
    border-color: rgba(253, 246, 227, 0.2);
  }
  .dark-panel .filter-tab,
  .modal .filter-tab { color: #64748b; }
  .dark-panel .filter-tab.active,
  .modal .filter-tab.active {
    background: rgba(253, 246, 227, 0.15);
    color: #fdf6e3;
    box-shadow: 1px 1px 0px rgba(0,0,0,0.2);
  }

  /* Search bar */
  .dark-panel .search-bar {
    background: rgba(30, 41, 59, 0.5);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
  }
  .dark-panel .search-bar input { color: #fdf6e3; }
  .dark-panel .search-bar input::placeholder { color: #64748b; }

  /* Tags */
  .dark-panel .tag { background: transparent; }
  .dark-panel .tag-green { background: rgba(52, 211, 153, 0.1); color: #34d399; border-color: #34d399; }
  .dark-panel .tag-amber { background: rgba(251, 191, 36, 0.1); color: #fbbf24; border-color: #fbbf24; }
  .dark-panel .tag-red { background: rgba(251, 113, 133, 0.1); color: #fb7185; border-color: #fb7185; }

  .dark-panel .permission-tag { background: rgba(148, 163, 184, 0.08); color: #94a3b8; border-color: rgba(148, 163, 184, 0.35); }

  .dark-panel .inline-badge { color: #94a3b8; }

  /* Trifecta warning */
  .dark-panel .trifecta-warning {
    background: rgba(251, 113, 133, 0.08);
    border-color: rgba(251, 113, 133, 0.4);
    box-shadow: 2px 2px 0px rgba(251, 113, 133, 0.15);
  }
  .dark-panel .trifecta-warning::after { border-color: rgba(251, 113, 133, 0.08); }
  .dark-panel .trifecta-title { color: #fb7185; }
  .dark-panel .trifecta-text { color: #cbd5e1; }

  /* Cost bar */
  .dark-panel .cost-bar-track {
    background: #334155;
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 1px 1px 0px rgba(0,0,0,0.2);
  }
  .dark-panel .cost-bar-fill { background: #fb7185; }

  /* Cost breakdown */
  .dark-panel .cost-breakdown {
    background: rgba(15, 23, 42, 0.5);
    border-color: rgba(253, 246, 227, 0.15);
  }
  .dark-panel .cost-breakdown-row { color: #cbd5e1; }
  .dark-panel .cost-breakdown-label { color: #94a3b8; }
  .dark-panel .cost-breakdown-value { color: #fdf6e3; }

  /* Intervention badge */
  .dark-panel .intervention-badge.pause { background: rgba(251, 191, 36, 0.08); color: #fbbf24; border-color: #fbbf24; }
  .dark-panel .intervention-badge.disable { background: rgba(251, 113, 133, 0.08); color: #fb7185; border-color: #fb7185; }
  .dark-panel .intervention-badge.hint { background: rgba(52, 211, 153, 0.08); color: #34d399; border-color: #34d399; }
  .dark-panel .intervention-badge.reframe { background: rgba(251, 191, 36, 0.08); color: #fbbf24; border-color: #fbbf24; }

  /* FAB */
  .dark-panel .fab { background: #f59e0b; border-color: #0f172a; }

  /* Source badges */
  .dark-panel .source-badge { color: #64748b; }
  .dark-panel .source-badge.official { color: #34d399; }
  .dark-panel .source-badge.community { color: #fbbf24; }

  /* Upload area */
  .dark-panel .upload-area {
    border-color: rgba(253, 246, 227, 0.2);
    background: rgba(30, 41, 59, 0.3);
  }
  .dark-panel .upload-area:hover { background: rgba(52, 211, 153, 0.08); border-color: #34d399; }
  .dark-panel .upload-text { color: #fdf6e3; }
  .dark-panel .upload-sub { color: #64748b; }

  /* Recently resolved */
  .dark-panel .recently-resolved {
    background: rgba(30, 41, 59, 0.4);
    border-color: rgba(253, 246, 227, 0.1);
  }

  /* Candidate check */
  .dark-panel .candidate-check { border-color: rgba(253, 246, 227, 0.3); }

  /* Checkbox style for checked state */
  .dark-panel .divider { background: rgba(253, 246, 227, 0.08); }

  /* Savings */
  .dark-panel .savings-option {
    background: rgba(30, 41, 59, 0.5);
    border-color: rgba(253, 246, 227, 0.2);
    box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
  }
  .dark-panel .savings-option:hover { background: rgba(52, 211, 153, 0.08); border-color: #34d399; }

  /* Empty state */
  .dark-panel .empty-state-text { color: #fdf6e3; }

  /* Import step */
  .dark-panel .import-step {
    background: rgba(30, 41, 59, 0.4);
    border-color: rgba(253, 246, 227, 0.15);
  }

  /* BOTTOM NAV — Neo-retro pixel style */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 390px;
    height: 64px;
    margin: 0 auto;
    background: #0f172a;
    border-top: 1px solid #334155;
    display: flex;
    z-index: 50;
  }

  .nav-item {
    flex: 1;
    cursor: pointer;
  }

  .nav-item:hover { background: transparent; }

  .nav-icon {
    color: #94a3b8;
  }

  .nav-icon svg, .nav-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .nav-item.active .nav-icon { color: #fbbf24; }

  .nav-label {
    font-family: 'Pixelify Sans', monospace;
    font-size: 9px;
    color: #94a3b8;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  .nav-item.active .nav-label { color: #fbbf24; }

  /* Tailwind-ish utilities used by the bottom-nav markup */
  .bottom-nav .flex { display: flex; }
  .bottom-nav .flex-col { flex-direction: column; }
  .bottom-nav .items-center { align-items: center; }
  .bottom-nav .justify-center { justify-content: center; }
  .bottom-nav .relative { position: relative; }
  .bottom-nav .absolute { position: absolute; }
  .bottom-nav .w-full { width: 100%; }
  .bottom-nav .h-full { height: 100%; }
  .bottom-nav .w-6 { width: 24px; }
  .bottom-nav .h-6 { height: 24px; }
  .bottom-nav .w-4 { width: 16px; }
  .bottom-nav .h-4 { height: 16px; }
  .bottom-nav .top-0 { top: 0; }
  .bottom-nav .left-0 { left: 0; }
  .bottom-nav .-top-1\.5 { top: -6px; }
  .bottom-nav .-right-2 { right: -8px; }
  .bottom-nav .gap-1\.5 { gap: 6px; }
  .bottom-nav .h-\[3px\] { height: 3px; }
  .bottom-nav .bg-amber-400 { background: #fbbf24; }
  .bottom-nav .bg-red-500 { background: #ef4444; }
  .bottom-nav .border-\[1px\] { border-width: 1px; border-style: solid; }
  .bottom-nav .border-slate-900 { border-color: #0f172a; }
  .bottom-nav .rounded-sm { border-radius: 2px; }
  .bottom-nav .text-white { color: #ffffff; }
  .bottom-nav .text-\[9px\] { font-size: 9px; }
  .bottom-nav .font-bold { font-weight: 700; }
  .bottom-nav .leading-none { line-height: 1; }
  .bottom-nav .object-contain { object-fit: contain; }
  /* Slight downscale for visually large icons (harbor, skills) while keeping wrapper fixed */
  .bottom-nav .icon-sm { width: 20px; height: 20px; }

  /* CARDS — pixel art style */
  .card {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 14px;
    box-shadow: 3px 3px 0px var(--ocean);
    margin-bottom: 12px;
    position: relative;
    clip-path: var(--pixel-clip);
  }

  .card::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #c4a882;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  .card-sm {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 12px;
    box-shadow: 2px 2px 0px var(--ocean);
    margin-bottom: 10px;
    position: relative;
    clip-path: var(--pixel-clip-sm);
  }

  .card-sm::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #c4a882;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  /* SECTION HEADERS */
  .section-label {
    font-family: 'Pixelify Sans', monospace;
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    margin-top: 4px;
  }

  .section-title {
    font-family: 'Pixelify Sans', monospace;
    font-size: 18px;
    color: var(--ocean);
    margin-bottom: 4px;
  }

  /* STAT CHIPS */
  .stat-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 12px 0;
  }

  .stat-chip {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    box-shadow: 2px 2px 0px var(--ocean);
    position: relative;
    clip-path: polygon(
      0 3px, 3px 3px, 3px 0,
      calc(100% - 3px) 0, calc(100% - 3px) 3px, 100% 3px,
      100% calc(100% - 3px), calc(100% - 3px) calc(100% - 3px), calc(100% - 3px) 100%,
      3px 100%, 3px calc(100% - 3px), 0 calc(100% - 3px)
    );
    min-width: 70px;
    box-shadow: var(--card-shadow-sm);
  }

  .stat-chip-value {
    font-family: 'Pixelify Sans', monospace;
    font-size: 16px;
    color: var(--ocean);
  }

  .stat-chip-label {
    font-size: 10px;
    color: var(--gray);
    font-weight: 500;
  }

  .stat-chip.cost .stat-chip-value { color: var(--coral); }
  .stat-chip.alert .stat-chip-value { color: var(--amber); }
  .stat-chip.failures-ok .stat-chip-value { color: var(--seafoam); }
  .stat-chip.failures-warn .stat-chip-value { color: var(--amber); }
  .stat-chip.failures-error .stat-chip-value { color: var(--coral); }

  /* LOBSTER CHARACTER */
  .lobster-area {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-mid) 100%);
    border: 2px solid var(--ocean);
    border-radius: 0;
    margin-bottom: 12px;
    box-shadow: 3px 3px 0px var(--ocean);
    clip-path: var(--pixel-clip);
  }

  /* HARBOR FULL-SCREEN LAYOUT */
  .harbor-page {
    padding: 0 !important;
    padding-top: 56px !important;
    padding-bottom: 0 !important;
    overflow-y: auto;
  }

  .harbor-hero {
    width: 100%;
    min-height: 420px;
    background: transparent;
    position: relative;
  }

  .harbor-topbar {
    position: absolute;
    top: 0;
    left: 16px;
    right: 16px;
  }

  .harbor-topbar .harbor-agent-card {
    position: absolute;
    top: 55px;
    left: 0;
    z-index: 20;
  }

  .harbor-topbar .harbor-gear {
    position: absolute;
    top: -34px;
    right: 0;
  }

  /* HARBOR AGENT CARD — JRPG floating name-tag */
  .harbor-agent-card {
    width: 280px;
    background: rgba(15, 23, 42, 0.85);
    border: 2px solid rgba(253, 246, 227, 0.5);
    outline: 2px solid #0f172a;
    border-radius: 0;
    padding: 6px 10px 6px 6px;
    display: flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    position: relative;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .harbor-agent-card:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
  }

  .harbor-agent-card:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .harbor-agent-avatar {
    width: 30px;
    height: 30px;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    border: 1px solid #fdf6e3;
    flex-shrink: 0;
    box-shadow: none;
  }

  .harbor-agent-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .harbor-agent-name {
    font-family: 'Pixelify Sans', monospace;
    font-size: 16px;
    color: #fdf6ec;
    display: flex;
    align-items: center;
    gap: 5px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .harbor-agent-status {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .harbor-agent-status .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 0;
    border: none;
  }

  .harbor-agent-status .status-dot.active {
    background: #5cdb5c;
    box-shadow: 0 0 4px rgba(92, 219, 92, 0.6);
  }

  .harbor-agent-status .status-dot.idle {
    background: var(--amber);
    box-shadow: 0 0 3px rgba(240, 168, 48, 0.5);
  }

  .harbor-agent-status .status-text {
    color: #e8d8b8;
    font-family: 'Pixelify Sans', monospace;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .harbor-agent-chevron {
    color: #e8d8b8;
    margin-left: 2px;
  }

  /* Agent dropdown on Harbor — JRPG menu */
  .harbor-agent-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    width: 100%;
    background: rgba(15, 23, 42, 0.92);
    border: 2px solid #fdf6e3;
    outline: 2px solid #0f172a;
    border-radius: 0;
    padding: 4px;
    z-index: 200;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    animation: fadeIn 0.15s ease;
  }

  .harbor-agent-option {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 10px;
    border-radius: 0;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }

  .harbor-agent-option:hover {
    background: rgba(253, 246, 227, 0.12);
    border-color: rgba(253, 246, 227, 0.2);
  }

  .harbor-agent-option.active {
    background: rgba(253, 246, 227, 0.1);
    border-color: #fdf6e3;
  }

  .harbor-agent-option-avatar {
    width: 26px;
    height: 26px;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    border: 1px solid #fdf6e3;
    flex-shrink: 0;
    box-shadow: none;
  }

  .harbor-agent-option-info {
    display: flex;
    flex-direction: column;
    gap: 0px;
  }

  .harbor-agent-option-name {
    font-family: 'Pixelify Sans', monospace;
    font-size: 12px;
    color: #fdf6ec;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .harbor-agent-option-status {
    font-size: 10px;
    color: #d8c8a8;
    font-family: 'Pixelify Sans', monospace;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
  }

  .harbor-sign {
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><rect width="10" height="10" fill="%23c8933a"/></svg>');
    background-color: #c8933a;
    border: 3px solid #7a5020;
    border-radius: 4px;
    padding: 7px 16px;
    font-family: 'Pixelify Sans', monospace;
    font-size: 16px;
    color: #3a1f05;
    box-shadow: 0 3px 0 #7a5020, 2px 5px 12px rgba(0,0,0,0.5);
    letter-spacing: 0.5px;
  }

  .harbor-gear {
    background: transparent;
    border: none;
    border-radius: 0;
    width: 66px; height: 66px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: none;
    transition: transform 0.1s;
  }

  .harbor-gear:hover {
    transform: scale(1.1);
    box-shadow: none;
  }

  .harbor-gear:active {
    transform: scale(0.95);
    box-shadow: none;
  }

  .harbor-bubble {
    position: absolute;
    top: 126px;
    left: 1rem;
    width: 280px;
    z-index: 15;
    background: rgba(15, 23, 42, 0.88);
    border: 2px solid rgba(253, 246, 227, 0.5);
    outline: 2px solid #0f172a;
    border-radius: 0;
    padding: 14px 16px 18px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
  }

  .harbor-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 38px;
    width: 0; height: 0;
    border: 5px solid transparent;
    border-top-color: #0f172a;
  }

  .harbor-bubble::before {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 39px;
    width: 0; height: 0;
    border: 4px solid transparent;
    border-top-color: rgba(253, 246, 227, 0.5);
    z-index: 1;
  }

  .harbor-bubble-text {
    font-size: 13px;
    font-family: 'Pixelify Sans', monospace;
    color: #fdf6e3;
    line-height: 1.6;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }

  .harbor-bubble-close {
    position: absolute;
    top: 6px;
    right: 8px;
    font-family: 'Pixelify Sans', monospace;
    font-size: 14px;
    color: #64748b;
    cursor: pointer;
    padding: 0 3px;
    line-height: 1;
    z-index: 2;
  }
  .harbor-bubble-close:hover { color: #fdf6e3; }


  .harbor-bubble-prompt {
    position: absolute;
    bottom: 6px;
    right: 10px;
    font-size: 10px;
    color: #fdf6e3;
    font-family: 'Pixelify Sans', monospace;
    animation: rpgBlink 1s steps(1) infinite;
  }

  @keyframes rpgBlink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .harbor-bubble-status {
    font-family: 'Pixelify Sans', monospace;
    font-size: 10px;
    color: var(--seafoam);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .harbor-catch.expanded { min-height: 420px; }

  .harbor-catch {
    background: rgba(15, 23, 42, 0.82);
    border-top: 2px solid rgba(253, 246, 227, 0.5);
    border-left: 2px solid rgba(253, 246, 227, 0.5);
    border-right: 2px solid rgba(253, 246, 227, 0.5);
    border-bottom: none;
    border-radius: 0;
    padding: 0 16px 0;
    margin-top: 80px;
    margin-left: 1rem;
    margin-right: 1rem;
    margin-bottom: 0;

    box-shadow: 6px 0px 0px 0px rgba(0,0,0,0.4);
    padding-bottom: 64px;
  }

  /* keep old lobster classes for non-harbor pages, just in case */
  .lobster-emoji { font-size: 40px; }
  .lobster-speech-text { font-size: 13px; color: var(--dark); line-height: 1.4; }
  .lobster-status { font-family: 'Pixelify Sans', monospace; font-size: 10px; color: var(--seafoam); margin-top: 4px; }

  /* COST WIDGET */
  .cost-bar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .cost-bar-track {
    flex: 1;
    height: 10px;
    background: var(--gray-light);
    border-radius: 0;
    margin: 0 10px;
    overflow: hidden;
    border: 2px solid var(--ocean);
    box-shadow: 1px 1px 0px var(--ocean);
  }

  .cost-bar-fill {
    height: 100%;
    background: var(--coral);
    border-radius: 0;
    transition: width 0.5s steps(12);
    image-rendering: pixelated;
  }

  /* HEARTBEAT TIMELINE */
  .timeline {
    position: relative;
    padding-left: 20px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--gray-light);
  }

  .timeline-item {
    position: relative;
    margin-bottom: 8px;
  }

  .timeline-dot {
    position: absolute;
    left: -17px;
    top: 8px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gray-light);
    border: 2px solid var(--ocean);
  }

  .timeline-dot.alert { background: var(--amber); }
  .timeline-dot.danger { background: var(--coral); }
  .timeline-dot.routine { background: var(--seafoam); }

  .timeline-routine {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--sand-light);
    border: 1px solid var(--gray-light);
    border-radius: 0;
    cursor: default;
  }

  .timeline-routine-time {
    font-size: 11px;
    color: var(--gray);
    font-family: 'Pixelify Sans', monospace;
    min-width: 42px;
  }

  .timeline-routine-label {
    font-size: 12px;
    color: var(--gray);
    flex: 1;
  }

  .timeline-routine-cost {
    font-size: 11px;
    color: var(--gray);
    font-family: 'Pixelify Sans', monospace;
  }

  .timeline-card {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 12px;
    box-shadow: 2px 2px 0px var(--ocean);
    cursor: pointer;
    position: relative;
    clip-path: var(--pixel-clip-sm);
  }

  .timeline-card::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #c4a882;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  .timeline-card.alert { border-color: var(--amber); background: var(--amber-light); box-shadow: 2px 2px 0px var(--amber); }
  .timeline-card.alert::after { border-color: #e8c88a; }
  .timeline-card.danger { border-color: var(--coral); background: var(--red-light); box-shadow: 2px 2px 0px var(--coral); }
  .timeline-card.danger::after { border-color: #e8a0a0; }

  .timeline-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .timeline-card-title {
    font-family: 'Pixelify Sans', monospace;
    font-size: 13px;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .timeline-card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timeline-card-time {
    font-size: 11px;
    color: var(--gray);
    font-family: 'Pixelify Sans', monospace;
  }

  .timeline-card-cost {
    font-size: 11px;
    color: var(--coral);
    font-family: 'Pixelify Sans', monospace;
    font-weight: 700;
  }

  .timeline-card-body {

  .intervention-btn {

    border: 2px solid var(--ocean);

    padding: 5px 10px;
    font-size: 11px;
    font-family: 'Pixelify Sans', monospace;
    color: var(--ocean);

    box-shadow: 2px 2px 0px var(--ocean);

    display: flex;
    align-items: center;
    gap: 4px;
  }

  .intervention-btn:hover {
    background: var(--ocean);
    color: var(--sand);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0px var(--ocean);
  }

  .intervention-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0px var(--ocean);
  }

  /* CONSEQUENCE MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .modal {
    width: 390px;
    background: rgba(15, 23, 42, 0.95);
    border: 2px solid rgba(253, 246, 227, 0.5);
    border-bottom: none;
    border-radius: 0;
    padding: 20px 20px 32px;
    clip-path: polygon(
      0 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0,
      calc(100% - 8px) 0, calc(100% - 8px) 4px, calc(100% - 4px) 4px, calc(100% - 4px) 8px, 100% 8px,
      100% 100%, 0 100%
    );
    box-shadow: 0 -4px 0 rgba(0,0,0,0.3);
    animation: slideUp 0.2s ease;
    color: #e2e8f0;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: #334155;
    border-radius: 0;
    margin: 0 auto 16px;
    border: 1px solid rgba(253, 246, 227, 0.25);
  }

  .modal-title {
    font-family: 'Pixelify Sans', monospace;
    font-size: 17px;
    color: #fdf6e3;
    margin-bottom: 4px;
  }

  .modal-subtitle {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 16px;
  }

  .consequence-list { margin-bottom: 16px; }

  .consequence-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(253, 246, 227, 0.08);
    font-size: 13px;
    color: #cbd5e1;
    line-height: 1.4;
  }

  .consequence-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 0;
    font-family: 'Pixelify Sans', monospace;
    font-size: 14px;
    cursor: pointer;
    border: 2px solid rgba(253, 246, 227, 0.25);
    transition: all 0.1s;
    box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
  }

  .btn:active { transform: translate(2px, 2px); box-shadow: none; }

  .btn-ghost {
    background: rgba(30, 41, 59, 0.5);
    color: #94a3b8;
    border-color: rgba(148, 163, 184, 0.35);
  }

  .btn-primary {
    background: transparent;
    color: #38bdf8;
    border-color: #38bdf8;
  }

  .btn-amber {
    background: transparent;
    color: #fbbf24;
    border-color: #fbbf24;
  }

  .btn-coral {
    background: transparent;
    color: #fb7185;
    border-color: #fb7185;
  }

  /* MEMORY */
  .memory-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 12px;
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    box-shadow: 2px 2px 0px var(--ocean);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
    clip-path: var(--pixel-clip-sm);
  }

  .memory-item::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #c4a882;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  .memory-item:hover { transform: translate(-1px, -1px); box-shadow: 3px 3px 0px var(--ocean); }

  .memory-source-tag {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 0;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    font-family: 'Pixelify Sans', monospace;
    border: 1px solid;
  }

  .memory-source-tag.user {
    background: var(--seafoam-faint);
    color: var(--seafoam);
    border-color: var(--seafoam);
  }

  .memory-source-tag.agent {
    background: #e8f0ff;
    color: #4a70c8;
    border-color: #4a70c8;
  }

  .memory-source-tag.imported {
    background: var(--amber-light);
    color: #c87830;
    border-color: #c87830;
  }

  .memory-content {
    flex: 1;
  }

  .memory-text {
    font-size: 13px;
    color: var(--dark);
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .memory-date {
    font-size: 11px;
    color: var(--gray);
    font-family: 'Pixelify Sans', monospace;
  }

  .memory-delete {
    color: var(--gray);
    font-size: 14px;
    cursor: pointer;
    padding: 2px;
    transition: color 0.1s;
  }

  .memory-delete:hover { color: var(--coral); }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    background: rgba(30, 41, 59, 0.5);
    border-color: rgba(253, 246, 227, 0.2);
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 4px;
    clip-path: var(--pixel-clip-sm);
  }

  .filter-tab {
    flex: 1;
    padding: 7px;
    border-radius: 0;
    font-family: 'Pixelify Sans', monospace;
    font-size: 11px;
    text-align: center;
    cursor: pointer;
    color: #64748b;
    transition: all 0.1s;
  }

  .filter-tab.active {
    background: rgba(253, 246, 227, 0.15);
    color: #fdf6e3;
    box-shadow: 1px 1px 0px rgba(0,0,0,0.2);
  }

  /* TOOLS GRID */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }

  .tool-card {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 12px 8px;
    text-align: center;
    box-shadow: 2px 2px 0px var(--ocean);
    clip-path: var(--pixel-clip-sm);
  }

  .tool-card.green { border-color: var(--seafoam); background: var(--seafoam-faint); box-shadow: 2px 2px 0px var(--seafoam); }
  .tool-card.amber { border-color: var(--amber); background: var(--amber-light); box-shadow: 2px 2px 0px var(--amber); }
  .tool-card.red { border-color: var(--coral); background: var(--coral-faint); box-shadow: 2px 2px 0px var(--coral); }

  .tool-icon { font-size: 22px; margin-bottom: 4px; }
  .tool-name { font-family: 'Pixelify Sans', monospace; font-size: 10px; color: var(--ocean); }
  .tool-risk { font-size: 9px; margin-top: 3px; }
  .tool-risk.green { color: var(--seafoam); }
  .tool-risk.amber { color: var(--amber); }
  .tool-risk.red { color: var(--coral); }

  /* LETHAL TRIFECTA */
  .trifecta-warning {
    background: var(--red-light);
    border: 2px solid var(--coral);
    border-radius: 0;
    padding: 12px;
    margin-bottom: 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    box-shadow: 2px 2px 0px var(--coral);
    position: relative;
    clip-path: var(--pixel-clip-sm);
  }

  .trifecta-warning::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #e8a0a0;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  .trifecta-icon { font-size: 20px; flex-shrink: 0; }
  .trifecta-title { font-family: 'Pixelify Sans', monospace; font-size: 13px; color: var(--coral); margin-bottom: 3px; }
  .trifecta-text { font-size: 12px; color: var(--dark); line-height: 1.4; }

  /* SKILL CARDS */
  .skill-card {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 12px;
    box-shadow: 2px 2px 0px var(--ocean);
    margin-bottom: 8px;
    position: relative;
    clip-path: var(--pixel-clip-sm);
  }

  .skill-card::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #c4a882;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  .skill-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .skill-name {
    font-family: 'Pixelify Sans', monospace;
    font-size: 14px;
    color: var(--ocean);
  }

  .skill-toggle {
    width: 36px; height: 20px;
    border-radius: 0;
    border: 2px solid var(--ocean);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }

  .skill-toggle.on { background: var(--seafoam); }
  .skill-toggle.off { background: var(--gray-light); }

  .skill-toggle-thumb {
    position: absolute;
    top: 2px;
    width: 12px; height: 12px;
    background: white;
    border-radius: 0;
    border: 1px solid var(--ocean);
    transition: left 0.15s steps(3);
  }

  .skill-toggle.on .skill-toggle-thumb { left: 18px; }
  .skill-toggle.off .skill-toggle-thumb { left: 2px; }

  .permission-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .permission-tag {
    padding: 2px 7px;
    border-radius: 0;
    font-size: 10px;
    font-family: 'Pixelify Sans', monospace;
    border: 1px solid;
  }

  .permission-tag {
    background: rgba(148, 163, 184, 0.08);
    color: #64748b;
    border-color: #94a3b8;
  }

  .source-badge {
    font-size: 10px;
    color: var(--gray);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .source-badge.official { color: var(--seafoam); }
  .source-badge.community { color: var(--amber); }

  /* APPROVAL DOCK */
  .approval-card {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 14px;
    box-shadow: 3px 3px 0px var(--ocean);
    margin-bottom: 12px;
    position: relative;
    clip-path: var(--pixel-clip);
  }

  .approval-card::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #c4a882;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  .approval-card.budget { border-color: var(--amber); background: var(--amber-light); box-shadow: 3px 3px 0px var(--amber); }
  .approval-card.budget::after { border-color: #e8c88a; }

  .approval-type {
    font-family: 'Pixelify Sans', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .approval-type.budget { color: var(--amber); }

  .approval-content {
    background: rgba(30, 41, 59, 0.5);
    border: 2px solid rgba(253, 246, 227, 0.15);
    border-radius: 0;
    padding: 10px;
    font-size: 12px;
    color: #e2e8f0;
    line-height: 1.5;
    margin: 8px 0 12px;
    clip-path: var(--pixel-clip-sm);
  }

  .approval-buttons {
    display: flex;
    gap: 6px;
  }

  .approval-btn {
    flex: 1;
    padding: 9px;
    border-radius: 0;
    font-family: 'Pixelify Sans', monospace;
    font-size: 12px;
    cursor: pointer;
    border: 2px solid var(--ocean);
    box-shadow: 2px 2px 0px var(--ocean);
    transition: all 0.1s;
    text-align: center;
    clip-path: var(--pixel-clip-sm);
  }

  .approval-btn:active { transform: translate(2px, 2px); box-shadow: none; }
  .approval-btn.approve { background: var(--seafoam); color: var(--dark); }
  .approval-btn.edit { background: var(--sand); color: var(--ocean); }
  .approval-btn.deny { background: var(--coral-faint); color: var(--coral); }

  /* SEARCH */
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 9px 12px;
    gap: 8px;
    margin-bottom: 12px;
    box-shadow: 2px 2px 0px var(--ocean);
    clip-path: var(--pixel-clip-sm);
  }

  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--dark);
  }

  .search-bar input::placeholder { color: var(--gray); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 76px;
    right: calc(50% - 195px + 16px);
    width: 56px; height: 56px;
    background: #f59e0b;
    border: 3px solid #0f172a;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 4px 4px 0px 0px #0f172a;
    z-index: 50;
  }

  .fab:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0px 0px #0f172a; }
  .fab:active { transform: translate(4px, 4px); box-shadow: none; }

  /* IMPORT STEPS */
  .import-step {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    margin-bottom: 8px;
    align-items: flex-start;
  }

  .import-step-num {
    width: 24px; height: 24px;
    background: var(--ocean);
    color: var(--sand);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Pixelify Sans', monospace;
    font-size: 12px;
    flex-shrink: 0;
  }

  .memory-candidate {
    background: var(--sand);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    box-shadow: 2px 2px 0px var(--ocean);
    position: relative;
    clip-path: var(--pixel-clip-sm);
  }

  .memory-candidate::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid #c4a882;
    pointer-events: none;
    clip-path: var(--pixel-clip-sm);
  }

  .candidate-check {
    width: 20px; height: 20px;
    border: 2px solid var(--ocean);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.1s;
  }

  .candidate-check.checked {
    background: var(--seafoam);
    border-color: var(--seafoam);
    color: white;
    font-size: 12px;
  }

  .candidate-text {
    flex: 1;
    font-size: 13px;
    color: var(--dark);
    line-height: 1.4;
  }

  .candidate-source {
    font-size: 10px;
    color: var(--gray);
    margin-top: 3px;
    font-style: italic;
  }

  /* BUDGET SAVINGS */
  .savings-option {
    background: rgba(30, 41, 59, 0.5);
    border: 2px solid rgba(253, 246, 227, 0.2);
    border-radius: 0;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.1s;
    box-shadow: 2px 2px 0px var(--ocean);
  }

  .savings-option:hover { background: rgba(52, 211, 153, 0.08); border-color: #34d399; }
  .savings-option.selected { background: rgba(52, 211, 153, 0.08); border-color: #34d399; }

  .savings-radio {
    width: 16px; height: 16px;
    border: var(--pixel-border);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .savings-radio.selected::after {
    content: '';
    width: 8px; height: 8px;
    background: var(--seafoam);
    border-radius: 50%;
  }

  .savings-text { flex: 1; font-size: 12px; color: #e2e8f0; line-height: 1.4; }
  .savings-amount { font-family: 'Pixelify Sans', monospace; font-size: 12px; color: var(--seafoam); font-weight: 700; }

  /* UPLOAD AREA */
  .upload-area {
    border: 2px dashed rgba(253, 246, 227, 0.2);
    border-radius: 0;
    padding: 24px;
    text-align: center;
    background: rgba(30, 41, 59, 0.3);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 12px;
    clip-path: var(--pixel-clip);
  }

  .upload-area:hover { background: rgba(52, 211, 153, 0.08); border-color: #34d399; }

  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-family: 'Pixelify Sans', monospace; font-size: 13px; color: #fdf6e3; }
  .upload-sub { font-size: 11px; color: #64748b; margin-top: 4px; }

  /* UTILITY */
  .divider { height: 1px; background: var(--gray-light); margin: 12px 0; }
  .text-sm { font-size: 12px; color: var(--gray); line-height: 1.5; }
  .text-xs { font-size: 11px; color: var(--gray); }
  .tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 0; font-size: 11px; font-family: 'Pixelify Sans', monospace; }
  .tag-green { background: var(--seafoam-faint); color: var(--seafoam); border: 1px solid var(--seafoam); }
  .tag-amber { background: var(--amber-light); color: #c87830; border: 1px solid #c87830; }
  .tag-red { background: var(--red-light); color: var(--coral); border: 1px solid var(--coral); }

  .cost-breakdown {
    background: var(--white);
    border: 2px solid var(--ocean);
    border-radius: 0;
    padding: 10px;
    margin-top: 8px;
    clip-path: var(--pixel-clip-sm);
  }

  .cost-breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
    color: var(--dark);
    border-bottom: 1px solid var(--gray-light);
  }

  .cost-breakdown-row:last-child { border-bottom: none; }
  .cost-breakdown-label { color: var(--gray); }
  .cost-breakdown-value { font-family: 'Pixelify Sans', monospace; color: var(--ocean); }

  .inline-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px;
    border-radius: 0;
    font-size: 10px;
    font-family: 'Pixelify Sans', monospace;
    margin-left: 4px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ocean);
    color: var(--sand);
    font-family: 'Pixelify Sans', monospace;
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 0;
    border: 2px solid var(--ocean-light);
    box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
    z-index: 400;
    white-space: nowrap;
    animation: toastIn 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.amber { background: var(--amber); color: var(--dark); border-color: #c87830; }
  .toast.seafoam { background: var(--seafoam); color: var(--dark); border-color: #2a8870; }
  .toast.coral { background: var(--coral); color: white; border-color: #b05030; }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* DISCONNECT OVERLAY */
  .disconnect-overlay {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(1px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }

  .disconnect-overlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .disconnect-card {
    width: 340px;
    background: rgba(15, 23, 42, 0.75);
    border: 2px solid rgba(253, 246, 227, 0.3);
    padding: 28px 24px 24px;
    clip-path: polygon(
      0 8px, 4px 8px, 4px 4px, 8px 4px, 8px 0,
      calc(100% - 8px) 0, calc(100% - 8px) 4px, calc(100% - 4px) 4px, calc(100% - 4px) 8px, 100% 8px,
      100% calc(100% - 8px), calc(100% - 4px) calc(100% - 8px), calc(100% - 4px) calc(100% - 4px), calc(100% - 8px) calc(100% - 4px), calc(100% - 8px) 100%,
      8px 100%, 8px calc(100% - 4px), 4px calc(100% - 4px), 4px calc(100% - 8px), 0 calc(100% - 8px)
    );
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    text-align: center;
    animation: disconnectCardIn 0.3s ease;
  }

  @keyframes disconnectCardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .disconnect-icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: inline-block;
    animation: lobsterFloat 2.5s ease-in-out infinite;
  }

  @keyframes lobsterFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .disconnect-title {
    font-family: 'Pixelify Sans', monospace;
    font-size: 20px;
    color: var(--sand);
    margin-bottom: 6px;
  }

  .disconnect-subtitle {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .disconnect-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Pixelify Sans', monospace;
    font-size: 12px;
    padding: 5px 12px;
    border: 2px solid;
    margin-bottom: 18px;
  }

  .disconnect-status.error {
    color: var(--coral);
    border-color: var(--coral);
    background: var(--coral-faint);
  }

  .disconnect-status.connecting {
    color: var(--amber);
    border-color: var(--amber);
    background: var(--amber-light);
  }

  .disconnect-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: statusPulse 1.5s ease-in-out infinite;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .disconnect-steps {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(253, 246, 227, 0.15);
    padding: 14px 16px;
    margin-bottom: 20px;
    text-align: left;
  }

  .disconnect-steps-title {
    font-family: 'Pixelify Sans', monospace;
    font-size: 11px;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .disconnect-step {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12px;
    line-height: 1.5;
    color: #94a3b8;
  }

  .disconnect-step:last-child { margin-bottom: 0; }

  .disconnect-step-num {
    font-family: 'Pixelify Sans', monospace;
    color: var(--ocean-light);
    flex-shrink: 0;
    width: 16px;
  }

  .disconnect-step code {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 11px;
    background: rgba(253, 246, 227, 0.08);
    padding: 1px 5px;
    color: var(--sand);
    border: 1px solid rgba(253, 246, 227, 0.12);
  }

  .disconnect-buttons {
    display: flex;
    gap: 10px;
  }

  .disconnect-btn {
    flex: 1;
    font-family: 'Pixelify Sans', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border: 2px solid;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .disconnect-btn.primary {
    background: var(--amber);
    color: var(--dark);
    border-color: #c87830;

    color: var(--ocean-light);

    transform: translateY(-1px);

    transform: translateY(1px);
    box-shadow: 1px 1px 0px rgba(0,0,0,0.2);
  }

    animation: spin 1s linear infinite;
  }

    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .intervention-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 0;

    font-size: 11px;
    margin-bottom: 8px;
    border: 2px solid;

    padding: 6px 12px;
    font-size: 11px;
    font-family: 'Pixelify Sans', monospace;
    color: var(--ocean);
    cursor: pointer;
    box-shadow: var(--card-shadow-sm);
    margin-left: auto;
  }

  .resume-btn:hover { background: var(--seafoam); color: var(--dark); }

  .animate-in {
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--gray);

  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }

function showToast(message, color = '') {
  setState({ toast: { message, color } });
  setTimeout(() => setState({ toast: null }), 2200);
}

function applyIntervention(eventId, type) {
  const labels = {
    pause:   { iconName: 'pause',   text: 'Agent paused by you · just now', color: 'amber' },
    disable: { iconName: 'wrench',  text: 'Tool disabled by you · just now', color: 'coral' },
    hint:    { iconName: 'compass', text: 'Hint injected · takes effect next heartbeat', color: 'seafoam' },
    reframe: { iconName: 'refreshCw', text: 'New directive sent · takes effect next heartbeat', color: 'amber' },
  };
  const toastMessages = {
    pause:   'Agent paused — takes effect immediately',
    disable: 'Tool disabled — agent updated',
    hint:    'Hint injected — active next heartbeat',
    reframe: 'New directive sent — active next heartbeat',
  };
  const newInterventions = { ...state.interventions, [eventId]: { type, iconName: labels[type].iconName, text: labels[type].text, color: labels[type].color } };
  setState({ showModal: null, modalData: null, interventions: newInterventions });
  showToast(toastMessages[type], labels[type].color);
}

// ─── DRAWER WRAPPER ──────────────────────────────────────────────────────────
function wrapInDrawer(renderFn) {
  const backdrop = document.createElement('div');
  backdrop.className = 'drawer-backdrop';

  const drawer = document.createElement('div');
  drawer.className = 'drawer-container dark-panel';

  const handle = document.createElement('div');
  handle.className = 'drawer-handle';
  handle.innerHTML = `
    <div class="drawer-handle-lines">
      <div class="drawer-handle-line"></div>
      <div class="drawer-handle-line"></div>
    </div>
  `;

  const content = document.createElement('div');
  content.className = 'drawer-content';
  renderFn(content);

  drawer.appendChild(handle);
  drawer.appendChild(content);

  return { backdrop, drawer };
}

// ─── DISCONNECT OVERLAY ──────────────────────────────────────────────────────
function renderDisconnectOverlay() {
  const overlay = document.createElement('div');
  overlay.className = 'disconnect-overlay';

  const isConnecting = state.gatewayConnecting;
  const statusClass = isConnecting ? 'connecting' : 'error';
  const statusText = isConnecting ? 'Connecting...' : 'Disconnected';

  overlay.innerHTML = `
    <div class="disconnect-card">
      <div class="disconnect-icon">🦞</div>
      <div class="disconnect-title">Gateway Not Connected</div>
      <div class="disconnect-subtitle">Connect to your OpenClaw Gateway to see live data</div>

      <div class="disconnect-status ${statusClass}">
        <div class="disconnect-status-dot"></div>
        ${statusText}
      </div>

      <div class="disconnect-steps">
        <div class="disconnect-steps-title">Setup Guide</div>
        <div class="disconnect-step">
          <span class="disconnect-step-num">1.</span>
          <span>Copy config: <code>cp .env.example .env</code></span>
        </div>
        <div class="disconnect-step">
          <span class="disconnect-step-num">2.</span>
          <span>Edit <code>.env</code> → set <code>OPENCLAW_GATEWAY_URL=ws://&lt;ip&gt;:18789</code></span>
        </div>
        <div class="disconnect-step">
          <span class="disconnect-step-num">3.</span>
          <span>Restart server: <code>node server.js</code></span>
        </div>
      </div>

      <div class="disconnect-buttons">
        <button class="disconnect-btn primary" id="disconnect-mock-btn">
          🔌 Preview Mock
        </button>
        <button class="disconnect-btn secondary ${isConnecting ? 'spinning' : ''}" id="disconnect-retry-btn" ${isConnecting ? 'disabled' : ''}>
          <span class="disconnect-btn-icon">⟳</span> ${isConnecting ? 'Connecting...' : 'Reconnect'}
        </button>
      </div>
    </div>
  `;

  // Mock button — switch to mock mode
  overlay.querySelector('#disconnect-mock-btn').addEventListener('click', () => {
    overlay.classList.add('fade-out');
    setTimeout(() => {
      setState({ forceMock: true, showDisconnectOverlay: false });
    }, 400);
  });

  // Retry button — attempt reconnection
  overlay.querySelector('#disconnect-retry-btn').addEventListener('click', () => {
    if (state.gatewayConnecting) return;
    setState({ gatewayConnecting: true });

    gateway.disconnect();
    gateway.connect().then(() => {
      setState({
        gatewayConnected: true,
        gatewayReady: true,
        gatewayConnecting: false,
        showDisconnectOverlay: false,
        toast: { message: '🦞 Connected to OpenClaw', color: 'green' },
      });
      setTimeout(() => setState({ toast: null }), 3000);
      loadLiveData();
    }).catch((err) => {
      setState({
        gatewayConnected: false,
        gatewayConnecting: false,
        gatewayError: err.message,
      });
      showToast('Connection failed: ' + err.message, 'coral');
    });
  });

  return overlay;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const nodes = [];

  // Harbor background — always visible behind everything
  const bgLayer = document.createElement('div');
  bgLayer.className = 'harbor-bg-layer';
  bgLayer.innerHTML = `<video src="clawbg.mp4" autoplay loop muted playsinline></video>`;
  nodes.push(bgLayer);

  // Landing page — show first, then transition to app
  if (state.showLanding) {
    nodes.push(renderLanding());
    app.replaceChildren(...nodes);
    return;
  }

  // If disconnect overlay is active, only show video + overlay
  if (state.showDisconnectOverlay) {
    nodes.push(renderDisconnectOverlay());
    app.replaceChildren(...nodes);
    return;
  }

  // Topbar — show on all pages
  nodes.push(renderTopbar());

  // Agent dropdown (only on non-harbor pages; harbor has its own inline dropdown)
  if (state.showAgentDrop && state.page !== 'harbor') {
    nodes.push(renderAgentDropdown());
  }

  if (state.page === 'harbor') {
    // Harbor renders full-screen over the background
    const page = document.createElement('div');
    renderHarbor(page);
    page.className = 'page harbor-page';
    nodes.push(page);
  } else {
    // Non-Harbor tabs render as bottom drawers
    let renderFn;
    if (state.page === 'heartbeat') renderFn = renderHeartbeat;
    else if (state.page === 'memory') renderFn = renderMemory;
    else if (state.page === 'approval') renderFn = renderApproval;
    else if (state.page === 'skills') renderFn = renderSkills;

    if (renderFn) {
      const { backdrop, drawer } = wrapInDrawer(renderFn);
      nodes.push(backdrop);
      nodes.push(drawer);
    }
  }

  // Bottom nav
  nodes.push(renderBottomNav());

  // Modals
  if (state.showModal) {
    nodes.push(renderModal());
  }

  // Toast
  if (state.toast) {
    const toast = document.createElement('div');
    toast.className = `toast ${state.toast.color}`;
    toast.textContent = state.toast.message;
    nodes.push(toast);
  }

  // Settings sheet
  if (state.showSettings) {
    nodes.push(renderSettings());
  }

  app.replaceChildren(...nodes);

  // Close dropdowns on outside click
  document.addEventListener('click', () => {
    if (state.showAgentDrop) setState({ showAgentDrop: false });
    if (state.showSettings) setState({ showSettings: false });
  }, { once: true });
}

// ─── TOPBAR ──────────────────────────────────────────────────────────────────
function renderTopbar() {
  const agent = AGENTS.find(a => a.id === state.agentId);
  const el = document.createElement('div');
  el.className = 'topbar';
  el.innerHTML = `
    <div class="topbar-sign"><img src="header-sign.png" alt="Lobster Watch"></div>
    <div class="topbar-settings" id="topbar-settings-btn">${icon('settings', 66, 'rgba(255,255,255,0.85)')}</div>
  `;
  el.querySelector('#topbar-settings-btn').onclick = (e) => {
    e.stopPropagation();
    setState({ showSettings: !state.showSettings, showAgentDrop: false });
  };
  return el;
}

function renderAgentDropdown() {
  const el = document.createElement('div');
  el.className = 'agent-dropdown';
  el.innerHTML = AGENTS.map(a => `
    <div class="agent-option ${a.id === state.agentId ? 'active' : ''}" data-id="${a.id}">
      <div class="agent-dot ${a.status === 'idle' ? 'idle' : ''}"></div>
      <div>
        <div class="agent-option-name">${a.name}</div>
        <div class="agent-option-status">${a.status}</div>
      </div>
    </div>
  `).join('');
  el.querySelectorAll('.agent-option').forEach(opt => {
    opt.onclick = (e) => {
      e.stopPropagation();
      setState({ agentId: opt.dataset.id, showAgentDrop: false });
    };
  });
  return el;
}

    { id: 'skills', label: 'Skills' },
    { id: 'memory', label: 'Memory' },
  ];

    const iconKey = t.id === 'approval' ? 'dock' : t.id;
    const isActive = state.page === t.id;
    const sizeClass = (iconKey === 'harbor' || iconKey === 'skills') ? ' icon-sm' : '';
    let iconHtml = CUSTOM_ICONS[iconKey];
    if (iconHtml.includes('<svg')) {
      if (iconHtml.includes('class="')) {
        iconHtml = iconHtml.replace(/class="([^"]*)"/, (m, cls) => `class="${cls} w-full h-full object-contain${sizeClass}"`);

        iconHtml = iconHtml.replace('<svg', `<svg class="w-full h-full object-contain${sizeClass}"`);
      }

      <div class="nav-item flex flex-col items-center justify-center gap-1.5 relative w-full h-full ${isActive ? 'active' : ''}" data-page="${t.id}">

        </div>
        <div class="nav-label">${t.label}</div>
      </div>
    `;
  }).join('');
  el.querySelectorAll('.nav-item').forEach(item => {
    item.onclick = () => setState({ page: item.dataset.page });
  });
  return el;
}

function renderHarbor(el) {

    </div>

  heroEl.querySelector('#harbor-agent-btn').onclick = (e) => {

  if (state.showAgentDrop) {
    heroEl.querySelectorAll('.harbor-agent-option').forEach(opt => {

    };
  }
  el.appendChild(heroEl);

  // Today's Catch section — slides up over the hero
  const catchEl = document.createElement('div');

  const harborHeader = document.createElement('div');

// ─── HEARTBEAT LOG ────────────────────────────────────────────────────────────
function renderHeartbeat(el) {
  const headerEl = document.createElement('div');
  headerEl.innerHTML = `
    <div class="section-label">Today · Feb 28</div>
    <div class="section-title">Heartbeat Log</div>
    <div class="text-sm" style="margin-bottom:14px;">8 cycles · 1 alert · 1 anomaly</div>
  `;
  el.appendChild(headerEl);

  const timeline = document.createElement('div');
  timeline.className = 'timeline';

  HEARTBEAT_EVENTS.forEach(event => {
    const item = document.createElement('div');
    item.className = 'timeline-item';

    if (event.type === 'routine') {
      item.innerHTML = `
        <div class="timeline-dot routine"></div>
        <div class="timeline-routine">
          <span class="timeline-routine-time">${event.time}</span>
          <span class="timeline-routine-label">${event.label}</span>
          <span class="timeline-routine-cost">${event.cost}</span>
        </div>
      `;
    } else {
      const isExpanded = state.expandedEvent === event.id;
      const dotClass = event.type === 'danger' ? 'danger' : 'alert';

      const intervention = state.interventions[event.id];
      const isPaused = intervention?.type === 'pause';

      item.innerHTML = `
        <div class="timeline-dot ${dotClass}"></div>
        <div class="timeline-card ${event.type} ${isPaused ? 'paused' : ''}" data-id="${event.id}" style="${isPaused ? 'opacity:0.75;' : ''}">
          <div class="timeline-card-header">
            <div class="timeline-card-title">
              ${icon(event.titleIcon || 'activity', 14, 'var(--ocean)')} ${event.title}
            </div>
            <div class="timeline-card-meta">
              ${event.costSpike ? '<span class="tag tag-red" style="font-size:9px; padding:1px 5px;">10x avg</span>' : ''}
              <span class="timeline-card-cost">${event.cost}</span>
              <span class="timeline-card-time">${event.time}</span>
            </div>
          </div>
          ${intervention ? `
            <div class="intervention-badge ${intervention.type} animate-in" style="display:flex;align-items:center;">
              <span style="display:flex;margin-right:4px;">${icon(intervention.iconName, 13, 'currentColor')}</span>
              <span>${intervention.text}</span>
              ${isPaused ? `<button class="resume-btn" data-resume="${event.id}" style="display:flex;align-items:center;gap:4px;">${icon('play',11,'var(--ocean)')} Resume</button>` : ''}
            </div>
          ` : ''}
          ${isExpanded ? `
            <div class="timeline-card-body animate-in">${event.summary}</div>
            ${!isPaused ? `
            <div class="intervention-buttons">
              <button class="intervention-btn" data-action="hint">${icon('compass', 13)} Inject Hint</button>
              ${intervention?.type !== 'pause' ? `<button class="intervention-btn" data-action="pause">${icon('pause', 13)} Pause</button>` : ''}
              <button class="intervention-btn" data-action="reframe">${icon('refreshCw', 13)} Reframe</button>
              ${intervention?.type !== 'disable' ? `<button class="intervention-btn" data-action="disable">${icon('wrench', 13)} Disable Tool</button>` : ''}
            </div>` : ''}
          ` : `<div class="text-sm" style="margin-top:4px;">Tap to expand ↓</div>`}
        </div>
      `;

      item.querySelector('.timeline-card').onclick = () => {
        setState({ expandedEvent: isExpanded ? null : event.id });
      };

      if (isExpanded) {
        item.querySelectorAll('.intervention-btn').forEach(btn => {
          btn.onclick = (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            if (action === 'hint') {
              setState({ showModal: 'hint', modalData: event });
            } else if (action === 'reframe') {
              setState({ showModal: 'reframe', modalData: event });
            } else {
              setState({ showModal: 'consequence', modalData: { ...CONSEQUENCE_DATA[action], eventId: event.id, actionType: action } });
            }
          };
        });

        // Resume button
        const resumeBtn = item.querySelector('[data-resume]');
        if (resumeBtn) {
          resumeBtn.onclick = (e) => {
            e.stopPropagation();
            const newInterventions = { ...state.interventions };
            delete newInterventions[event.id];
            setState({ interventions: newInterventions });
            showToast('Agent resumed', 'seafoam');
          };
        }
      }
    }

    timeline.appendChild(item);
  });

  el.appendChild(timeline);

  // Storm warnings
  const stormEl = document.createElement('div');
  stormEl.style.marginTop = '16px';
  stormEl.innerHTML = `
    <div class="section-label">Storm Warnings</div>
    <div class="trifecta-warning">
      <div class="trifecta-icon">${icon('cloudLightning', 20, 'var(--coral)')}</div>
      <div>
        <div class="trifecta-title">Lethal Trifecta Active</div>
        <div class="trifecta-text">Your agent can read external content, execute commands, and has persistent memory — all simultaneously. This combination is vulnerable to prompt injection.</div>
      </div>
    </div>
  `;
  el.appendChild(stormEl);
}

// ─── MEMORY COVE ─────────────────────────────────────────────────────────────
function renderMemory(el) {
  const headerEl = document.createElement('div');
  headerEl.innerHTML = `
    <div class="section-label">Memory Cove</div>
    <div class="section-title">What your lobster remembers</div>
    <div class="text-sm" style="margin-bottom:12px;">${state.memories.length} entries · tap to expand</div>
  `;
  el.appendChild(headerEl);

  // Search
  const searchEl = document.createElement('div');
  searchEl.className = 'search-bar';
  searchEl.innerHTML = `<span style="color:var(--gray);display:flex;">${icon('search', 16, 'var(--gray)')}</span><input placeholder="Search memories..." id="mem-search">`;
  el.appendChild(searchEl);

  // Filter tabs
  const filterEl = document.createElement('div');
  filterEl.className = 'filter-tabs';
  filterEl.innerHTML = ['all', 'mine', 'agent'].map(f => `
    <div class="filter-tab ${state.memFilter === f ? 'active' : ''}" data-filter="${f}">
      ${f === 'all' ? 'All' : f === 'mine' ? `${icon('user',11,'currentColor')} You added` : `${icon('cpu',11,'currentColor')} Agent added`}
    </div>
  `).join('');
  filterEl.querySelectorAll('.filter-tab').forEach(tab => {
    tab.onclick = () => setState({ memFilter: tab.dataset.filter });
  });
  el.appendChild(filterEl);

  // Memory list
  const filtered = state.memories.filter(m => {
    if (state.memFilter === 'mine') return m.source === 'user' || m.source === 'imported';
    if (state.memFilter === 'agent') return m.source === 'agent';
    return true;
  });

  filtered.forEach(mem => {
    const sourceLabel = mem.source === 'user' ? 'You added'
      : mem.source === 'imported' ? `Imported · ${mem.importSource}`
      : 'Agent added';
    const tagClass = mem.source === 'user' ? 'user' : mem.source === 'imported' ? 'imported' : 'agent';

    const memEl = document.createElement('div');
    memEl.className = 'memory-item';
    memEl.innerHTML = `
      <div class="memory-content">
        <div class="memory-text">${mem.text}</div>
        <div style="display:flex; align-items:center; gap:8px; margin-top:6px;">
          <span class="memory-source-tag ${tagClass}">${sourceLabel}</span>
          <span class="memory-date">${mem.date}</span>
        </div>
      </div>
      <div class="memory-delete" data-id="${mem.id}">${icon('trash', 15, 'var(--gray)')}</div>
    `;

    memEl.querySelector('.memory-delete').onclick = (e) => {
      e.stopPropagation();
      setState({ showModal: 'delete-memory', modalData: { id: mem.id, text: mem.text } });
    };

    el.appendChild(memEl);
  });

  // FAB
  const fab = document.createElement('div');
  fab.className = 'fab';
  fab.innerHTML = `<div style="position:relative;width:24px;height:24px;"><div style="position:absolute;top:50%;left:0;right:0;height:4px;background:#0f172a;transform:translateY(-50%);"></div><div style="position:absolute;left:50%;top:0;bottom:0;width:4px;background:#0f172a;transform:translateX(-50%);"></div></div>`;
  fab.onclick = () => setState({ showModal: 'plant', plantMode: 'text', plantText: '' });
  el.appendChild(fab);
}

    label.className = 'section-label';

      const toolEl = document.createElement('div');

        <div class="tool-icon">${icon(TOOL_LUCIDE[tool.icon] || 'wrench', 22, iconColor)}</div>
        <div class="tool-name">${tool.name}</div>
        <div class="tool-risk ${tool.risk}">${tool.riskLabel}</div>
      `;

    infoEl.className = 'card';
    infoEl.innerHTML = `
      <div style="font-family:'Pixelify Sans',monospace; font-size:12px; color:var(--gray); margin-bottom:6px;">Risk Legend</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <span class="tag tag-green">Read-only</span>
        <span class="tag tag-amber">Write access</span>
        <span class="tag" style="background:var(--red-light);color:var(--coral);border:1px solid var(--coral);">Execute / Persist</span>
      </div>

  } else {
    // Skills tab
    const label = document.createElement('div');
    label.innerHTML = `
      <div class="section-label">Installed Skills · ${SKILLS.length} total</div>
    `;
    el.appendChild(label);

    SKILLS.forEach(skill => {
      const isOn = state.skillToggles[skill.id];
      const skillEl = document.createElement('div');
      skillEl.className = 'skill-card';
      // Apply risk color to card border + background like tool cards
      const riskStyles = {
        low:  'border-color:var(--seafoam); background:var(--seafoam-faint);',
        medium: 'border-color:var(--amber); background:var(--amber-light);',
        high: 'border-color:var(--coral); background:var(--coral-faint);',
      };
      skillEl.style.cssText = riskStyles[skill.risk] || '';
      skillEl.innerHTML = `
        <div class="skill-header">
          <div>
            <div class="skill-name">${skill.name}</div>
            <div class="source-badge ${skill.source}" style="font-size:11px; margin-top:2px;">
              ${skill.source === 'official' ? `<span style="display:flex;align-items:center;gap:3px;">${icon('check',10,'var(--seafoam)')} Official</span>` : `<span style="display:flex;align-items:center;gap:3px;">${icon('alertTriangle',10,'var(--amber)')} Community</span>`}

      el.appendChild(skillEl);
